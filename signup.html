<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blush Boutique | Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="soft-page">
  <main class="form-page">
    <section class="form-card wide-card">
      <a class="back-link" href="index.html">← Back to Welcome</a>
      <p class="eyebrow">Create an Account</p>
      <h1 class="section-title">Join Blush Boutique</h1>
      <p class="section-copy">Save your details and start adding your favorite pieces to cart.</p>

      <form id="signupForm" class="shop-form grid-form" novalidate>
        <div>
          <label for="fullName">Full Name</label>
          <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
        </div>
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required>
        </div>
        <div>
          <label for="signupUsername">User Name</label>
          <input type="text" id="signupUsername" name="username" placeholder="Choose a username" required>
        </div>
        <div>
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
        </div>
        <div>
          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" name="password" placeholder="Create a password" required>
        </div>
        <div>
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
        </div>
        <div class="form-span">
          <p id="signupMessage" class="form-message" aria-live="polite"></p>
          <button type="submit" class="btn btn-primary full-width">Sign Up</button>
        </div>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
